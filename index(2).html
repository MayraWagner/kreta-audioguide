<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreta Audioguide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #1a1a2e;
      color: #fff;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1533104816931-20fa691ff6ca?w=1200&q=80');
      background-size: cover;
      background-position: center 40%;
      filter: brightness(0.65);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(10,20,50,0.85) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 20px 22px;
      width: 100%;
    }

    .hero-tag {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      backdrop-filter: blur(6px);
    }

    .hero h1 { font-size: 28px; font-weight: 700; line-height: 1.15; }
    .hero p { margin-top: 6px; font-size: 14px; color: rgba(255,255,255,0.75); }

    .track-list {
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 680px;
      margin: 0 auto;
    }

    .track-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      transition: background 0.2s;
    }

    .track-card.active {
      background: rgba(100,170,255,0.15);
      border-color: rgba(100,170,255,0.4);
    }

    .track-card.missing { opacity: 0.45; }

    .track-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .track-num {
      min-width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      flex-shrink: 0;
    }

    .track-card.active .track-num { background: #4a9eff; color: #fff; }
    .track-info { flex: 1; min-width: 0; }

    .track-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .progress-bar-wrap {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 4px 0 6px;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: #4a9eff;
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }

    .progress-bar-wrap input[type=range] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.15s, transform 0.1s;
    }

    .ctrl-btn:hover { color: #fff; }
    .ctrl-btn:active { transform: scale(0.9); }

    .ctrl-btn.play-pause {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #4a9eff;
      color: #fff;
    }

    .ctrl-btn.play-pause:hover { background: #6ab2ff; }
    .ctrl-btn.play-pause:disabled { background: rgba(255,255,255,0.15); cursor: default; }

    /* ── MAPS BUTTON ── */
    .maps-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      padding: 7px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .maps-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .maps-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-tag">🏛 Audioguide Super Special Edition</div>
    <h1>Kreta</h1>
    <p>8 Stationen · Tippe auf einen Track zum Abspielen</p>
  </div>
</div>

<div class="track-list" id="trackList"></div>
<div class="footer">Papas Kreta Audioguide &copy; 2026</div>

<script>
const tracks = [
  { num: 1, title: "Alles Liebe zum Geburtstag", sub: "Juhuu, endlich 60!",    file: "track-01.ogg", maps: null },
  { num: 2, title: "Neratze Moschee",             sub: "Rethymno",             file: "track-02.ogg", maps: "https://maps.google.com/?q=Neratze+Mosque+Rethymno+Crete" },
  { num: 3, title: "Rimondi-Brunnen",              sub: "Rethymno",             file: "track-03.ogg", maps: "https://maps.google.com/?q=Rimondi+Fountain+Rethymno+Crete" },
  { num: 4, title: "Fortezza Festung",             sub: "Rethymno",             file: "track-04.ogg", maps: "https://maps.google.com/?q=Fortezza+Rethymno+Crete" },
  { num: 5, title: "Arkadi-Kloster",               sub: "Nähe von Rethymno",    file: "track-05.ogg", maps: "https://maps.google.com/?q=Arkadi+Monastery+Crete" },
  { num: 6, title: "Koules Festung",               sub: "Iraklio",              file: "track-06.ogg", maps: "https://maps.google.com/?q=Koules+Fortress+Heraklion+Crete" },
  { num: 7, title: "Knossos",                      sub: "Iraklio",              file: "track-07.ogg", maps: "https://maps.google.com/?q=Palace+of+Knossos+Crete" },
  { num: 8, title: "Schön wars!",                  sub: "Jetzt mal Pause!",     file: "track-08.ogg", maps: null },
];

const audioEls = [];

function formatTime(s) {
  if (!s || isNaN(s)) return "0:00";
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
}

function setIcon(i, playing) {
  const el = document.getElementById(`pp-icon-${i}`);
  el.innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function togglePlay(i) {
  const a = audioEls[i];
  if (!a) return;
  if (a.paused) {
    audioEls.forEach((x, j) => {
      if (x && j !== i && !x.paused) {
        x.pause(); setIcon(j, false);
        document.getElementById(`card-${j}`).classList.remove("active");
      }
    });
    a.play();
    setIcon(i, true);
    document.getElementById(`card-${i}`).classList.add("active");
  } else {
    a.pause();
    setIcon(i, false);
    document.getElementById(`card-${i}`).classList.remove("active");
  }
}

function skip(i, sec) {
  const a = audioEls[i];
  if (a) a.currentTime = Math.max(0, Math.min(a.duration||0, a.currentTime + sec));
}

function buildCards() {
  const list = document.getElementById("trackList");
  tracks.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "track-card";
    card.id = `card-${i}`;
    const audio = new Audio(t.file);
    audio.preload = "metadata";
    audioEls.push(audio);

    const mapsBtn = t.maps
      ? `<a class="maps-btn" href="${t.maps}" target="_blank">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
             <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
             <circle cx="12" cy="10" r="3"/>
           </svg>
           Karte
         </a>`
      : '';

    card.innerHTML = `
      <div class="track-header">
        <div class="track-num">${t.num}</div>
        <div class="track-info">
          <div class="track-title">${t.title}</div>
          <div class="track-subtitle">${t.sub}</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-fill" id="pf-${i}"></div>
        <input type="range" min="0" max="100" value="0" id="seek-${i}">
      </div>
      <div class="time-row">
        <span id="cur-${i}">0:00</span>
        <span id="dur-${i}">--:--</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="skip(${i},-15)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-5.01"/>
          </svg>
        </button>
        <button class="ctrl-btn play-pause" id="pp-${i}" onclick="togglePlay(${i})">
          <svg id="pp-icon-${i}" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="ctrl-btn" onclick="skip(${i},15)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.49-5.01"/>
          </svg>
        </button>
      </div>
      ${mapsBtn}
    `;

    list.appendChild(card);

    document.getElementById(`seek-${i}`).addEventListener("input", e => {
      if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration;
    });
    audio.addEventListener("timeupdate", () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      document.getElementById(`pf-${i}`).style.width = pct + "%";
      document.getElementById(`seek-${i}`).value = pct;
      document.getElementById(`cur-${i}`).textContent = formatTime(audio.currentTime);
    });
    audio.addEventListener("loadedmetadata", () => {
      document.getElementById(`dur-${i}`).textContent = formatTime(audio.duration);
    });
    audio.addEventListener("ended", () => setIcon(i, false));
    audio.addEventListener("error", () => {
      card.classList.add("missing");
      document.getElementById(`pp-${i}`).disabled = true;
      document.getElementById(`dur-${i}`).textContent = "fehlt";
    });
  });
}

buildCards();
</script>
</body>
</html>
